<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="./assests/css/utilities.css">

        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <header>
        <!-- NAVBAR -->

        <nav class="navbar navbar-expand-lg fixed-top border-bottom border">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo01" aria-controls="navbarTogglerDemo01" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse " id="navbarTogglerDemo01">
                    <div class="col-3">
                        <a class="text-decoration-none logo fs48 fw700" href="#">ProdCart</a>
                    </div>

                    <div class="col-9 allList">
                        <ul class="navbar-nav  mx-auto" style="gap: 30px;">
                            <li class="nav-item">
                                <a class=" list  fs18 fw500" aria-current="page" href="./index.html">Home</a>
                            </li>
                            <li class="nav-item ">
                                <a class=" list fs18 fw500" href="./add-product.html">Add - View</a>
                            </li>
                            <li class="nav-item ">
                                <a class=" list active fs18 fw500" href="./edit-product.html">Edit Product</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <!-- EDIT PRODUCTS -->

        <section class="edit-product py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <form id="editProductForm" class="bg-light p-4 rounded shadow">
                            <div class="head">
                                <h2 class="text-center fs40 fw-bold mb-5">Edit Product Form</h2>
                            </div>
                            <div class="mb-3">
                                <label for="editPrName" class="form-label">Product Name</label>
                                <input type="text" class="form-control" id="editPrName" />
                            </div>
                            <div class="mb-3">
                                <label for="editPrCategory" class="form-label">Category</label>
                                <input type="text" class="form-control" id="editPrCategory" />
                            </div>
                            <div class="mb-3">
                                <label for="editPrImage" class="form-label">Image</label>
                                <textarea type="text" class="form-control" id="editPrImage" placeholder="Update Image URL" rows="1"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="editPrPrice" class="form-label">Price</label>
                                <input type="number" class="form-control" id="editPrPrice" />
                            </div>
                            <div class="mb-3">
                                <label for="editPrDesc" class="form-label">Description</label>
                                <textarea class="form-control" id="editPrDesc" rows="5"></textarea>
                            </div>
                            <button type="submit" class=" update-btn w-100">Update Product</button>
                        </form>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    let products = JSON.parse(localStorage.getItem("products")) || [];

    let editProductId = localStorage.getItem("editProductId");

    if (editProductId) {

        let product = products.find(
            p => p.id == editProductId
        );

        if (product) {
            document.getElementById("editPrName").value = product.name;
            document.getElementById("editPrCategory").value = product.category;
            document.getElementById("editPrPrice").value = product.price;
            document.getElementById("editPrImage").value = product.image;
            document.getElementById("editPrDesc").value = product.description;
        }
    }

    let editProductForm = document.getElementById("editProductForm");

    editProductForm.addEventListener("submit", function (e) {
        e.preventDefault();

        let productIndex = products.findIndex(
            p => p.id == editProductId
        );

        if (productIndex !== -1) {

            products[productIndex] = {
                ...products[productIndex],
                name: document.getElementById("editPrName").value.trim(),
                category: document.getElementById("editPrCategory").value.trim(),
                price: Number(document.getElementById("editPrPrice").value),
                image: document.getElementById("editPrImage").value.trim(),
                description: document.getElementById("editPrDesc").value.trim()
            };

            localStorage.setItem(
                "products",
                JSON.stringify(products)
            );

            localStorage.removeItem("editProductId");

            alert("Product Updated Successfully!");

            editProductForm.reset();

            window.location.href = "./add-product.html";
        }
        else {
            alert("Product not found!");
        }
    });

    if (!editProductId) {
        editProductForm.reset();
    }
</script>
    <script src="./assets/js/script.js"></script>

</body>

</html>
